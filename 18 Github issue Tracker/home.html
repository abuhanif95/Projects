<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <title>GitHub Issues Tracker</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="./style.css" />

    <!-- Tailwind CSS + daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Outfit fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Header Section -->
    <header class="shadow-lg">
      <nav
        class="w-11/12 mx-auto py-3 flex flex-col space-y-2 md:flex-row justify-between items-center gap-2"
      >
        <!-- Logo and title -->
        <div class="flex items-center justify-center gap-3">
          <img
            src="./assets/github-logo.png"
            alt="Github Logo"
            class="h-8 w-8"
          />
          <h2 class="text-2xl font-semibold whitespace-nowrap">
            GitHub Issues Tracker
          </h2>
        </div>

        <!-- Search and button section -->
        <div class="flex items-center gap-2">
          <label class="input">
            <input
              id="input-search"
              type="search"
              required
              placeholder="Search..."
              class="w-24 sm:w-auto"
            />
          </label>

          <button class="btn btn-primary text-white">+ New Issue</button>
        </div>
      </nav>
    </header>

    <!-- Main Container -->
    <main class="space-y-3">
      <!-- All/Open/Closed buttons -->
      <div
        class="w-10/12 mx-auto bg-white shadow-2xl rounded-md mt-12 space-x-2 p-4"
      >
        <button class="btn btn-primary sm:px-8" id="all-issue-btn">All</button>
        <button class="btn sm:px-8" id="open-issue-btn">Open</button>
        <button class="btn sm:px-8" id="closed-issue-btn">Closed</button>
      </div>

      <!-- Issue List Container -->
      <div
        class="w-10/12 mx-auto bg-base-200 shadow-xl space-y-2 rounded-md flex flex-col justify-between items-center"
      >
        <!-- Issue summary -->
        <div
          class="w-full p-4 bg-white rounded-tr-md rounded-tl-md flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"
        >
          <!-- Left section with icon and text -->
          <div class="flex justify-start items-center gap-2 w-full sm:w-auto">
            <div
              class="h-12 w-12 bg-purple-100 rounded-full flex justify-center items-center flex-shrink-0"
            >
              <img src="./assets/Aperture.png" class="w-[70%] h-[70%]" alt="" />
            </div>
            <div>
              <h2 class="text-xl font-medium">
                <span id="issue-count">50</span> Issues
              </h2>
              <p class="text-gray-600 text-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <!-- Right section with status indicators -->
          <div
            class="flex items-center justify-start sm:justify-center gap-5 font-medium w-full sm:w-auto"
          >
            <div class="flex items-center justify-center gap-1">
              <div class="rounded-full bg-green-600 h-3 w-3"></div>
              <p>Open</p>
            </div>
            <div class="flex items-center justify-center gap-1">
              <div class="rounded-full bg-purple-600 h-3 w-3"></div>
              <p>Closed</p>
            </div>
          </div>
        </div>

        <!-- loading spinner -->
        <div id="spinner" class="flex justify-center items-center py-10">
          <span class="loading loading-spinner loading-xl"></span>
        </div>

        <!-- Issue Cards -->
        <div
          id="issue-cards"
          class="w-full p-4 grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"
        >
          <!-- Issue card-->
        </div>
      </div>

      <!-- Open the modal using ID.showModal() method -->
      <dialog id="issue_modal" class="modal">
        <div class="modal-box">
          <div id="details-container" class="bg-white rounded-md space-y-2">
            <!-- issue modal -->
          </div>
          <div class="modal-action">
            <form method="dialog">
              <!-- if there is a button in form, it will close the modal -->
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <script src="./js/script.js"></script>
  </body>
</html>
